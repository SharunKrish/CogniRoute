services:
  db:
    image: postgres:15-alpine
    container_name: cogniroute_db
    environment:
      POSTGRES_DB: cogniroute
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cogniroute_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cogniroute_web
    command: >
      bash -c "python manage.py makemigrations &&
               python manage.py migrate &&
               python seed_db.py &&
               python manage.py collectstatic --noinput &&
               daphne -b 0.0.0.0 -p 8000 cogniroute.asgi:application"
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
    env_file:
      - ./server/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://postgres:postgrespassword@db:5432/cogniroute
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cogniroute_worker
    command: celery -A cogniroute worker --loglevel=info
    volumes:
      - ./server:/app
    env_file:
      - ./server/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://postgres:postgrespassword@db:5432/cogniroute
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  postgres_data:
