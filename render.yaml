services:
  # 1. Django Web API (Daphne ASGI)
  - type: web
    name: cogniroute-web
    env: docker
    plan: free
    dockerFilePath: Dockerfile
    dockerContext: .
    dockerCommand: >
      bash -c "python manage.py migrate &&
               python seed_db.py &&
               python manage.py collectstatic --noinput &&
               daphne -b 0.0.0.0 -p $PORT cogniroute.asgi:application"
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "cogniroute-web.onrender.com,localhost,127.0.0.1"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: WEBHOOK_SECRET
        value: cognifyr-secret-token-123
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false

  # 2. Celery Async Background Worker
  - type: worker
    name: cogniroute-worker
    env: docker
    plan: free
    dockerFilePath: Dockerfile
    dockerContext: .
    dockerCommand: celery -A cogniroute worker --loglevel=info
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false

